aid: qxo-building-products
name: QXO Building Products
description: >-
  QXO is a publicly traded company focused on building a tech-forward leader in
  the building products distribution industry through acquisitions and
  operational improvements. QXO offers a suite of customer-facing APIs for
  ordering, pricing, account management, product catalog, delivery tracking,
  and invoicing.
